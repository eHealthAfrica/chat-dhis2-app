  <text x="888" y="446" class="fieldValue">0800 123 4567</text>

  <rect x="404" y="492" width="954" height="96" rx="18" fill="#F8FAFC" stroke="#D0D5DD"/>
  <text x="428" y="522" class="fieldLabel">Address</text>
  <text x="428" y="556" class="fieldValue">12 Market Road, Garki</text>

  <rect x="404" y="612" width="954" height="108" rx="18" fill="#F8FAFC" stroke="#D0D5DD"/>
  <text x="428" y="642" class="fieldLabel">Coordinates</text>
  <rect x="428" y="660" width="190" height="38" rx="12" fill="#EFF8FF" stroke="#B2DDFF"/>
  <text x="523" y="684" text-anchor="middle" class="button" fill="#0B6BCB">Use current location</text>
  <rect x="634" y="650" width="300" height="48" rx="14" fill="#FFFFFF" stroke="#D0D5DD"/>
