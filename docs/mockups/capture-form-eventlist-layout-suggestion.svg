  <rect x="70" y="346" width="250" height="52" rx="14" fill="#EAF2FF" stroke="#B2DDFF"/>
  <circle cx="96" cy="372" r="12" fill="#0B6BCB"/>
  <text x="96" y="376" text-anchor="middle" class="button" fill="#FFFFFF">1</text>
  <text x="122" y="377" class="nav">Organisation unit</text>

  <rect x="70" y="410" width="250" height="52" rx="14" fill="#FFFFFF" stroke="#D0D5DD"/>
  <circle cx="96" cy="436" r="12" fill="#FFFFFF" stroke="#98A2B3"/>
  <text x="96" y="440" text-anchor="middle" class="button" fill="#475467">2</text>
  <text x="122" y="441" class="nav">Dates</text>

