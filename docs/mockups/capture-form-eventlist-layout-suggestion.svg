  <rect x="948" y="650" width="300" height="48" rx="14" fill="#FFFFFF" stroke="#D0D5DD"/>
  <text x="968" y="680" class="fieldLabel">Longitude</text>

  <rect x="370" y="846" width="1022" height="94" rx="22" fill="#FFFFFF" stroke="#D0D5DD"/>
  <text x="404" y="900" class="body">Saved at 10:42 AM</text>
  <rect x="1050" y="872" width="124" height="42" rx="14" fill="#FFFFFF" stroke="#D0D5DD"/>
  <text x="1112" y="898" text-anchor="middle" class="button" fill="#475467">Save progress</text>
  <rect x="1188" y="872" width="84" height="42" rx="14" fill="#FFFFFF" stroke="#D0D5DD"/>
  <text x="1230" y="898" text-anchor="middle" class="button" fill="#475467">Next</text>
  <rect x="1286" y="872" width="84" height="42" rx="14" fill="#0B6BCB"/>
  <text x="1328" y="898" text-anchor="middle" class="button" fill="#FFFFFF">Submit</text>
