  <circle cx="96" cy="500" r="12" fill="#FFFFFF" stroke="#98A2B3"/>
  <text x="96" y="504" text-anchor="middle" class="button" fill="#475467">3</text>
  <text x="122" y="505" class="nav">Household details</text>

  <rect x="70" y="538" width="250" height="52" rx="14" fill="#FFFFFF" stroke="#D0D5DD"/>
  <circle cx="96" cy="564" r="12" fill="#FFFFFF" stroke="#98A2B3"/>
  <text x="96" y="568" text-anchor="middle" class="button" fill="#475467">4</text>
  <text x="122" y="569" class="nav">Symptoms</text>

  <g filter="url(#shadowLg)">
    <rect x="370" y="264" width="1022" height="676" rx="24" fill="url(#panel)"/>
  </g>
