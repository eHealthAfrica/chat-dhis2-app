<svg width="1440" height="1024" viewBox="0 0 1440 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1440" y2="1024" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#EEF3F8"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1000" y2="620" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F9FBFD"/>
    </linearGradient>
    <filter id="shadowLg" x="0" y="0" width="1800" height="1400" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <filter id="shadowMd" x="0" y="0" width="1800" height="1400" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <style>
      .title { font: 700 32px "Segoe UI", Arial, sans-serif; fill: #182230; }
      .label { font: 700 12px "Segoe UI", Arial, sans-serif; fill: #667085; letter-spacing: 1px; text-transform: uppercase; }
      .body { font: 500 14px "Segoe UI", Arial, sans-serif; fill: #475467; }
      .mono { font: 700 12px Consolas, monospace; fill: #344054; }
      .nav { font: 600 13px "Segoe UI", Arial, sans-serif; fill: #344054; }
      .fieldLabel { font: 700 12px "Segoe UI", Arial, sans-serif; fill: #344054; text-transform: uppercase; letter-spacing: 0.7px; }
      .fieldValue { font: 600 15px "Segoe UI", Arial, sans-serif; fill: #101828; }
      .button { font: 700 13px "Segoe UI", Arial, sans-serif; }
    </style>
  </defs>

  <rect width="1440" height="1024" fill="url(#bg)"/>

  <rect x="48" y="32" width="116" height="34" rx="8" fill="#FFFFFF" stroke="#D0D5DD"/>
  <text x="106" y="54" text-anchor="middle" class="body">Back</text>

  <g filter="url(#shadowLg)">
    <rect x="48" y="84" width="1344" height="148" rx="26" fill="url(#panel)"/>
  </g>
  <rect x="48" y="84" width="1344" height="148" rx="26" fill="url(#panel)" stroke="#D0D5DD"/>
  <text x="82" y="136" class="title">Household Follow-Up Assessment</text>
  <rect x="84" y="150" width="92" height="26" rx="13" fill="#EEF2F6"/>
  <text x="130" y="167" text-anchor="middle" class="mono">HFAT-001</text>
  <text x="82" y="202" class="body">Use the same page language as the event list: raised header, structured left rail, and one strong content surface for the form.</text>

  <g filter="url(#shadowMd)">
    <rect x="1074" y="116" width="282" height="86" rx="20" fill="#FFFFFF"/>
  </g>
  <rect x="1074" y="116" width="282" height="86" rx="20" fill="#FFFFFF" stroke="#D0D5DD"/>
  <text x="1100" y="146" class="label">Organisation unit</text>
  <text x="1100" y="180" class="fieldValue">District Alpha</text>

  <g filter="url(#shadowLg)">
    <rect x="48" y="264" width="294" height="676" rx="22" fill="url(#panel)"/>
  </g>
