<svg width="1440" height="1024" viewBox="0 0 1440 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1440" y2="1024" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7FBFF"/>
      <stop offset="1" stop-color="#EEF3F8"/>
    </linearGradient>
    <linearGradient id="heroBg" x1="144" y1="88" x2="1296" y2="308" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F4F8FC"/>
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="360" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F9FBFD"/>
    </linearGradient>
    <filter id="shadowLg" x="0" y="0" width="1600" height="1200" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <filter id="shadowMd" x="0" y="0" width="1600" height="1200" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.09"/>
    </filter>
    <style>
      .title { font: 700 34px "Segoe UI", Arial, sans-serif; fill: #182230; }
      .section { font: 700 14px "Segoe UI", Arial, sans-serif; fill: #667085; letter-spacing: 1.2px; text-transform: uppercase; }
      .body { font: 500 15px "Segoe UI", Arial, sans-serif; fill: #475467; }
      .muted { font: 500 13px "Segoe UI", Arial, sans-serif; fill: #667085; }
      .cardTitle { font: 700 18px "Segoe UI", Arial, sans-serif; fill: #182230; }
      .mono { font: 700 12px Consolas, monospace; fill: #344054; }
      .smallCaps { font: 700 11px "Segoe UI", Arial, sans-serif; fill: #667085; letter-spacing: 1px; text-transform: uppercase; }
      .metric { font: 700 30px "Segoe UI", Arial, sans-serif; fill: #101828; }
      .metricLabel { font: 600 11px "Segoe UI", Arial, sans-serif; fill: #667085; letter-spacing: 0.8px; text-transform: uppercase; }
      .pill { font: 700 11px "Segoe UI", Arial, sans-serif; }
      .cta { font: 700 13px "Segoe UI", Arial, sans-serif; fill: #0B6BCB; }
    </style>
  </defs>

  <rect width="1440" height="1024" fill="url(#pageBg)"/>

  <rect x="144" y="72" width="1152" height="880" rx="28" fill="rgba(255,255,255,0.18)" stroke="rgba(208,213,221,0.55)" stroke-dasharray="8 10"/>
  <text x="164" y="58" class="section">80vw content frame</text>

