  <text x="176" y="690" class="smallCaps">Updated card direction</text>
  <text x="176" y="726" class="body">Cards are taller, easier to scan, and use dedicated zones for identity, stats, and action.</text>
  <text x="176" y="754" class="body">The 80vw frame allows a stable three-column layout on desktop without squeezing content.</text>
  <rect x="176" y="790" width="304" height="92" rx="18" fill="#F8FAFC" stroke="#D0D5DD"/>
  <text x="198" y="822" class="smallCaps">Visual treatment</text>
