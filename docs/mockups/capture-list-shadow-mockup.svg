      .label { font: 700 12px "Segoe UI", Arial, sans-serif; fill: #667085; letter-spacing: 1.2px; text-transform: uppercase; }
      .body { font: 500 15px "Segoe UI", Arial, sans-serif; fill: #344054; }
      .muted { font: 500 13px "Segoe UI", Arial, sans-serif; fill: #667085; }
      .mono { font: 700 12px Consolas, monospace; fill: #344054; }
      .num { font: 700 28px "Segoe UI", Arial, sans-serif; fill: #101828; }
      .pill { font: 600 13px "Segoe UI", Arial, sans-serif; fill: #344054; }
      .btn { font: 700 13px "Segoe UI", Arial, sans-serif; fill: white; }
      .tableHead { font: 700 12px "Segoe UI", Arial, sans-serif; fill: #475467; letter-spacing: 0.4px; }
      .tableCell { font: 500 13px "Segoe UI", Arial, sans-serif; fill: #101828; }
      .tag { font: 700 11px "Segoe UI", Arial, sans-serif; }
