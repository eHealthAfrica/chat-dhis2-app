<svg width="1440" height="1024" viewBox="0 0 1440 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1440" y2="1024" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4F7FB"/>
      <stop offset="1" stop-color="#E8EEF5"/>
    </linearGradient>
    <filter id="shadowLg" x="0" y="0" width="2000" height="1400" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#1F2937" flood-opacity="0.12"/>
    </filter>
    <filter id="shadowMd" x="0" y="0" width="2000" height="1400" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#1F2937" flood-opacity="0.1"/>
    </filter>
    <filter id="shadowSm" x="0" y="0" width="2000" height="1400" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1F2937" flood-opacity="0.09"/>
    </filter>
    <style>
      .title { font: 700 32px "Segoe UI", Arial, sans-serif; fill: #162033; }
